<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/api/web/favicon.png" />
    <link rel="apple-touch-icon" href="/api/web/apple-touch-icon.png" />
    <link rel="manifest" href="/api/web/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3801FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DocVault" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>DocVault — Web</title>
    <meta name="description" content="DocVault — Organised PDF storage. Secure, per-client privacy, real-time sync. Install as a desktop app." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the PWA service worker so Chrome / Edge / Safari can
      // offer the "Install DocVault" prompt (desktop app experience).
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/api/web/sw.js", { scope: "/api/web/" })
            .catch(function (err) { console.warn("SW registration failed:", err); });
        });
      }
    </script>
  </body>
</html>
